    font-family:'Tajawal', sans-serif;
  }
  .chip.active{background:var(--amber); color:#181203; border-color:var(--amber); font-weight:700;}

  /* Grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:14px;
    padding:8px 16px 40px;
    max-width:1100px;
    margin-inline:auto;
  }
  @media(min-width:640px){ .grid{grid-template-columns:repeat(3, 1fr);} }
  @media(min-width:960px){ .grid{grid-template-columns:repeat(4, 1fr);} }

  .card{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:14px;
    overflow:hidden;
    display:flex; flex-direction:column;
    transition:transform .15s ease, border-color .15s ease;
  }
  .card:hover{transform:translateY(-3px); border-color:var(--amber-dim);}

  .thumb{
    aspect-ratio:1/1; width:100%;
    background:#1D2330;
    position:relative;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .thumb .ph{color:#454E5F; font-size:12px; text-align:center; padding:10px;}
  .tag{
    position:absolute; top:8px; right:8px;
    background:rgba(11,14,19,0.75); backdrop-filter:blur(4px);
    color:var(--amber); font-size:10.5px; font-weight:700;

    font-size:13.5px; font-weight:500; font-family:'Tajawal',sans-serif;

  .empty-state{

function imgPath(id){ return `images/${id}.jpg`; }

const filtersEl = document.getElementById('filters');
const countPill = document.getElementById('countPill');

const categories = ["الكل", ...Array.from(new Set(products.map(p => p.cat)))];
let activeCat = "الكل";

function renderFilters(){
  filtersEl.innerHTML = "";
  categories.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (cat === activeCat ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = () => { activeCat = cat; renderFilters(); renderGrid(); };
    filtersEl.appendChild(chip);
  });
}

function renderGrid(){
  const list = activeCat === "الكل" ? products : products.filter(p => p.cat === activeCat);

  grid.innerHTML = "";
  if(list.length === 0){

    grid.appendChild(card);
  });
}
